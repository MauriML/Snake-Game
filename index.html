<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <title>Snake — Pro Edition</title>
</head>

<body>

  <div class="wrapper">

    <!-- HUD -->
    <div class="game-details">
      <span class="score">Score: 0</span>
      <div class="speed-container" title="Speed">
        <span class="speed-label">SPD</span>
        <div id="speed-bar"><div id="speed-fill"></div></div>
      </div>
      <span class="high-score">Best: 0</span>
    </div>

    <!-- Canvas -->
    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>

      <!-- Overlay: title + two-column body -->
      <div id="game-overlay">

        <!-- Row 1: title (spans both columns) -->
        <div class="overlay-header">
          <h1 id="overlay-title">SNAKE</h1>
          <p id="overlay-subtitle">Use arrow keys or swipe to move<br><small>Press P to pause</small></p>
        </div>

        <!-- Row 2 left: leaderboard -->
        <div id="leaderboard"></div>

        <!-- Row 2 right: skins (rendered by UIManager) -->
        <div id="skin-panel"></div>

        <!-- Row 3: name input (shown only on game over) -->
        <div id="name-input-wrapper" style="display:none">
          <input
            id="player-name"
            type="text"
            maxlength="20"
            placeholder="Your name"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="save-score-btn">Save Score</button>
        </div>

        <!-- Row 4: action button -->
        <button id="start-btn">START GAME</button>

      </div>
    </div>

    <!-- Unlock banner -->
    <div id="unlock-banner"></div>

    <!-- Mobile controls -->
    <div class="controls">
      <i data-key="ArrowLeft"  class="fa-solid fa-arrow-left-long"></i>
      <i data-key="ArrowUp"    class="fa-solid fa-arrow-up-long"></i>
      <i data-key="ArrowRight" class="fa-solid fa-arrow-right-long"></i>
      <i data-key="ArrowDown"  class="fa-solid fa-arrow-down-long"></i>
    </div>

  </div>

  <script type="module" src="src/main.js"></script>

</body>
</html>
